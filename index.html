          hskLevel: notebookFormValue("hskLevel") || "HSK",
          example: notebookFormValue("example"),
          note: notebookFormValue("note"),
          addedAt: existing?.addedAt,
          favorite: existing?.favorite,
        });
        if (!item.hanzi) {
          showToast("Hãy nhập chữ Hán trước.");
          return;
        }
        if (existing) {
          Object.assign(existing, item, {
            id: existing.id,
            addedAt: existing.addedAt,
            favorite: existing.favorite,
          });
          showToast("Đã lưu chỉnh sửa.");
        } else {
          state.notebook.items.unshift(item);
          showToast("Đã thêm từ mới.");
        }
        state.notebook.editingId = "";
        saveNotebook();
        render();
      };

      const exportNotebookJson = () => {
        const blob = new Blob([JSON.stringify(state.notebook.items, null, 2)], {
          type: "application/json;charset=utf-8",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "hsk_vocab_notebook.json";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      };

      const exportNotebookExcel = () => {
        if (!window.XLSX) {
          showToast("Chưa tải được thư viện Excel.");
          return;
        }
        const rows = state.notebook.items.map((item) => ({
          Hanzi: item.hanzi,
          Pinyin: item.pinyin,
          Meaning: item.meaning,
          HSK: item.hskLevel,
          Example: item.example,
          AddedAt: item.addedAt,
          Note: item.note,
          Favorite: item.favorite ? "yes" : "no",
        }));
        const sheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, sheet, "Notebook");
        XLSX.writeFile(workbook, "hsk_vocab_notebook.xlsx");
      };

      const parseNotebookRows = (rows) =>
        rows
          .map((row) =>
            normalizeNotebookItem({
              hanzi: row.Hanzi || row.hanzi || row.Front || row.front || row["Chữ Hán"],
              pinyin: row.Pinyin || row.pinyin,
              meaning:
                row.Meaning ||
                row.meaning ||
                row.Back ||
                row.back ||
                row["Nghĩa tiếng Việt"],
              hskLevel: row.HSK || row.hskLevel || row.Level || row.level,
              example: row.Example || row.example || row["Ví dụ"],
              addedAt: row.AddedAt || row.addedAt,
              note: row.Note || row.note || row["Ghi chú"],
              favorite: /yes|true|1|có/i.test(String(row.Favorite || row.favorite || "")),
            }),
          )
          .filter((item) => item.hanzi);

      const importNotebookFile = async (file) => {
        try {
          let imported = [];
          if (/\.json$/i.test(file.name)) {
            const parsed = JSON.parse(await file.text());
            imported = (Array.isArray(parsed) ? parsed : parsed.items || []).map(
              normalizeNotebookItem,
            );
          } else {
            if (!window.XLSX) {
              showToast("Chưa tải được thư viện Excel.");
              return;
            }
            const buffer = await file.arrayBuffer();
            const workbook = XLSX.read(buffer, { type: "array" });
            imported = workbook.SheetNames.flatMap((name) =>
              parseNotebookRows(
                XLSX.utils.sheet_to_json(workbook.Sheets[name], { defval: "" }),
              ),
            );
          }
          imported.filter((item) => item.hanzi).forEach((item) =>
            upsertNotebookItem(item, { silent: true }),
          );
          saveNotebook();
          showToast(`Đã nhập ${imported.length} mục vào sổ tay.`);
          render();
        } catch (error) {
          showToast("Không nhập được file sổ tay.");
        }
      };

      const renderNotebookForm = () => {
        const item =
          state.notebook.items.find((entry) => entry.id === state.notebook.editingId) ||
          {};
        return `
          <div class="notebook-form">
            <input data-notebook-field="hanzi" value="${escapeHtml(item.hanzi || "")}" placeholder="Chữ Hán" lang="zh-Hans" />
            <input data-notebook-field="pinyin" value="${escapeHtml(item.pinyin || "")}" placeholder="Pinyin" />
            <input data-notebook-field="meaning" value="${escapeHtml(item.meaning || "")}" placeholder="Nghĩa tiếng Việt" />
            <input data-notebook-field="hskLevel" value="${escapeHtml(item.hskLevel || "")}" placeholder="Cấp độ HSK" />
            <textarea data-notebook-field="example" placeholder="Ví dụ minh họa">${escapeHtml(item.example || "")}</textarea>
            <textarea data-notebook-field="note" placeholder="Ghi chú cá nhân">${escapeHtml(item.note || "")}</textarea>
            <div class="notebook-actions full-row">
              <button class="tool-button primary" data-notebook-save type="button">${state.notebook.editingId ? "Lưu chỉnh sửa" : "Thêm từ mới"}</button>
              <button class="tool-button" data-notebook-clear type="button">Làm trống</button>
            </div>
          </div>
        `;
      };

      const renderNotebookList = (items) => {
        if (!items.length) {
          return '<div class="field">Sổ tay chưa có từ phù hợp.</div>';
        }
        return items
          .map(
            (item) => `
              <div class="notebook-item">
                <div class="notebook-word">
                  <strong lang="zh-Hans">${escapeHtml(item.hanzi)}</strong>
                  <span>${escapeHtml(item.pinyin)}</span>
                  <span class="notebook-badge">${escapeHtml(item.hskLevel || "HSK")}</span>
                </div>
                <div class="notebook-detail">
                  <strong>${escapeHtml(item.meaning)}</strong>
                  ${item.example ? `<span>Ví dụ: ${escapeHtml(item.example)}</span>` : ""}
                  ${item.note ? `<span class="notebook-note">Ghi chú: ${escapeHtml(item.note)}</span>` : ""}
                  <span class="notebook-meta">Ngày thêm: ${escapeHtml(new Date(item.addedAt).toLocaleDateString("vi-VN"))}</span>
                </div>
                <div class="notebook-actions">
                  <button class="tool-button" data-notebook-favorite="${item.id}" type="button">${item.favorite ? "★" : "☆"}</button>
                  <button class="tool-button" data-notebook-edit="${item.id}" type="button">Sửa</button>
                  <button class="tool-button" data-notebook-delete="${item.id}" type="button">Xóa</button>
                </div>
              </div>
            `,
          )
          .join("");
      };

      const renderNotebookStudy = (items) => {
        if (!items.length) {
          stopNotebookAutoFlip();
          return '<div class="field">Chưa có từ để học lại.</div>';
        }
        state.notebook.studyIndex =
          (state.notebook.studyIndex + items.length) % items.length;
        const item = items[state.notebook.studyIndex];
        scheduleNotebookAutoFlip();
        return `
          <div class="notebook-study-card">
            <div class="notebook-study-controls">
              <button class="tool-button" data-notebook-random type="button">Ngẫu nhiên</button>
              <button class="tool-button ${state.notebook.autoFlip ? "primary" : ""}" data-notebook-autoflip type="button">Tự lật</button>
              <button class="tool-button ${state.notebook.favoriteOnly ? "primary" : ""}" data-notebook-favonly type="button">Chỉ yêu thích</button>
            </div>
            <div class="hanzi" lang="zh-Hans">${escapeHtml(item.hanzi)}</div>
            ${
              state.notebook.studyFlipped
                ? `
                  ${field("Pinyin", item.pinyin, "pinyin")}
                  ${field("Nghĩa", item.meaning, "meaning")}
                  ${field("Ví dụ", item.example, "example")}
                  ${field("Ghi chú", item.note)}
                `
                : '<div class="hint">Bấm Lật thẻ để xem đáp án.</div>'
            }
            <div class="progress-label">
              <span>${state.notebook.studyIndex + 1}/${items.length}</span>
              <span>${escapeHtml(item.hskLevel || "HSK")}</span>
            </div>
          </div>
        `;
      };

      const renderNotebook = () => {
        if (!renderFrame()) return;
        const levels = notebookLevels();
        const items = filteredNotebookItems();
        const levelOptions = [
          '<option value="all">Tất cả HSK</option>',
          ...levels.map(
            (level) =>
              `<option value="${escapeHtml(level)}" ${state.notebook.levelFilter === level ? "selected" : ""}>${escapeHtml(level)}</option>`,
          ),
        ].join("");
        el.lessonTitle.textContent = "📒 Sổ tay từ vựng";
        el.progressText.textContent = `${state.notebook.items.length} từ đã lưu`;
        el.cardLesson.textContent = "Notebook";
        el.cardIndex.textContent =
          state.notebook.mode === "study" ? "Ôn tập" : `${items.length} mục`;
        el.cardContent.innerHTML = `
          <div class="notebook-panel">
            <div class="notebook-toolbar">
              <div class="notebook-controls">
                <input id="notebookSearch" value="${escapeHtml(state.notebook.query)}" placeholder="Tìm chữ Hán, pinyin, nghĩa..." />
                <select id="notebookLevelFilter">${levelOptions}</select>
                <select id="notebookSort">
                  <option value="newest" ${state.notebook.sort === "newest" ? "selected" : ""}>Mới nhất</option>
                  <option value="oldest" ${state.notebook.sort === "oldest" ? "selected" : ""}>Cũ nhất</option>
                  <option value="az" ${state.notebook.sort === "az" ? "selected" : ""}>A-Z</option>
                </select>
              </div>
              <div class="notebook-actions">
                <button class="tool-button ${state.notebook.mode === "list" ? "primary" : ""}" data-notebook-mode="list" type="button">Danh sách</button>
                <button class="tool-button ${state.notebook.mode === "study" ? "primary" : ""}" data-notebook-mode="study" type="button">Flashcard</button>
              </div>
            </div>
            <div class="notebook-actions">
              <button class="tool-button" data-notebook-export-json type="button">Xuất JSON</button>
              <button class="tool-button" data-notebook-export-xlsx type="button">Xuất Excel</button>
              <label class="tool-button" for="notebookImportInput">Nhập file</label>
              <input id="notebookImportInput" type="file" accept=".json,.xlsx,.xls" style="display:none" />
            </div>
            ${
              state.notebook.mode === "list"
                ? `${renderNotebookForm()}<div class="notebook-list">${renderNotebookList(items)}</div>`
                : renderNotebookStudy(items)
            }
          </div>
        `;
      };

      const createMatch = () => {
        const cards = shuffleArray(
          getPracticeEligibleCards().filter((card) => card.front && card.back),
        ).slice(0, 6);
        cards.forEach((card) => {
          incrementPracticeCount(card);
          markCardViewed(card);
        });
        return {
          pairs: cards.map((card, index) => ({ id: String(index), card })),
          leftOrder: shuffleArray(cards.map((_, index) => String(index))),
          rightOrder: shuffleArray(cards.map((_, index) => String(index))),
          selectedLeft: "",
          matched: [],
          message: "Chọn một thẻ chữ Hán, rồi chọn nghĩa tương ứng.",
        };
      };

      const renderMatch = () => {
        if (!renderFrame()) return;
        if (!state.match) state.match = createMatch();
        const match = state.match;
        if (!match.pairs.length) {
          el.progressText.textContent = "Ghép thẻ";
          el.cardIndex.textContent = "0 / 0";
          el.cardContent.innerHTML =
            '<div class="practice-panel"><div class="field">Bài này chưa có đủ dữ liệu để tạo ghép thẻ.</div></div>';
          return;
        }
        el.progressText.textContent = `Ghép thẻ ${match.matched.length} / ${match.pairs.length}`;
        el.cardIndex.textContent = `${match.matched.length} / ${match.pairs.length}`;
        const pairById = Object.fromEntries(
          match.pairs.map((pair) => [pair.id, pair]),
        );
        const left = match.leftOrder
          .map((id) => {
            const pair = pairById[id];
            const matched = match.matched.includes(id);
            const selected = match.selectedLeft === id;
            return `<button class="match-button${matched ? " matched" : ""}${selected ? " selected" : ""}" data-match-left="${id}" type="button" ${matched ? "disabled" : ""} lang="zh-Hans">${escapeHtml(pair.card.front)}</button>`;
          })
          .join("");
        const right = match.rightOrder
          .map((id) => {
            const pair = pairById[id];
            const matched = match.matched.includes(id);
            return `<button class="match-button${matched ? " matched" : ""}" data-match-right="${id}" type="button" ${matched ? "disabled" : ""}>${escapeHtml(pair.card.back)}</button>`;
          })
          .join("");
        const matchProgress =
          Math.round((match.matched.length / match.pairs.length) * 100) || 0;
        el.cardContent.innerHTML = `
        <div class="practice-panel">
          <div class="progress-section">
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${matchProgress}%"></div>
            </div>
            <div class="progress-label">
              <span>Đã ghép: ${match.matched.length}/${match.pairs.length}</span>
            </div>
          </div>
          <div class="match-grid">
            <div class="match-column"><h2>中文</h2>${left}</div>
            <div class="match-column"><h2>Tiếng Việt</h2>${right}</div>
          </div>
          <div class="feedback">${escapeHtml(match.message)}</div>
        </div>
      `;
      };

      const renderManage = () => {
        if (!renderFrame()) return;
        const lesson = state.lessons[state.lessonIndex];
        el.progressText.textContent = `Quản lý ${lesson.cards.length} thẻ`;
        el.cardIndex.textContent = `${lesson.cards.length} thẻ`;
        const rows = lesson.cards
          .map(
            (card, index) => `
        <div class="edit-row" data-edit-index="${index}">
          <input data-edit-field="front" value="${escapeHtml(card.front)}" placeholder="中文 / Front" lang="zh-Hans" />
          <input data-edit-field="pinyin" value="${escapeHtml(card.pinyin)}" placeholder="Pinyin" />
          <textarea data-edit-field="back" placeholder="Tiếng Việt / Back">${escapeHtml(card.back)}</textarea>
          <textarea data-edit-field="example" placeholder="Ví dụ / Example">${escapeHtml(card.example)}</textarea>
          <button class="tool-button" data-delete-card="${index}" type="button">Xóa</button>
        </div>
      `,
          )
          .join("");
        el.cardContent.innerHTML = `
        <div class="editor-panel">
          <div class="editor-toolbar">
            <input class="lesson-name-input" id="lessonNameInput" value="${escapeHtml(lesson.name)}" aria-label="Tên bài học" />
            <div class="nav-buttons">
              <button class="tool-button primary" id="addCardButton" type="button">Thêm thẻ</button>
              <button class="tool-button" id="exportDataButton" type="button">Xuất JSON</button>
              <button class="tool-button" id="resetDataButton" type="button">Đặt lại</button>
            </div>
          </div>
          <div class="hint">Sửa trực tiếp trong ô. Dữ liệu được lưu trên trình duyệt sau mỗi thay đổi.</div>
          <div class="editor-list">${rows}</div>
        </div>
      `;
      };

      const render = () => {
        if (state.view !== "notebook") stopNotebookAutoFlip();
        if (state.view === "quiz") {
          renderQuiz();
          return;
        }
        if (state.view === "match") {
          renderMatch();
          return;
        }
        if (state.view === "miniExam") {
          renderMiniExam();
          return;
        }
        if (state.view === "progress") {
          renderProgressDashboard();
          return;
        }
        if (state.view === "notebook") {
          renderNotebook();
          return;
        }
        if (state.view === "manage") {
          renderManage();
          return;
        }
        renderFlashcard();
      };

      const nextCard = (step) => {
        const cards = cardList();
        if (!cards.length) return;
        state.cardIndex =
          (state.cardIndex + step + cards.length) % cards.length;
        state.flipped = false;
        render();
      };

      const nextPractice = (step = 1) => {
        if (state.view === "quiz") {
          state.quiz = createQuiz();
          render();
          return;
        }
        if (state.view === "match") {
          state.match = createMatch();
          render();
          return;
        }
        if (state.view === "miniExam") {
          const exam = state.miniExam || createMiniExam();
          if (!exam.questions.length) {
            state.miniExam = exam;
          } else if (exam.submitted) {
            state.miniExam = createMiniExam();
          } else {
            exam.currentIndex =
              (exam.currentIndex + step + exam.questions.length) %
              exam.questions.length;
            state.miniExam = exam;
          }
          render();
          return;
        }
        if (state.view === "progress") {
          render();
          return;
        }
        if (state.view === "notebook") {
          const items = filteredNotebookItems();
          if (state.notebook.mode === "study" && items.length) {
            state.notebook.studyIndex =
              (state.notebook.studyIndex + step + items.length) % items.length;
            state.notebook.studyFlipped = false;
          }
          render();
          return;
        }
        nextCard(step);
      };

      const shuffleCards = () => {
        if (state.view === "quiz") {
          state.quiz = createQuiz();
          render();
          return;
        }
        if (state.view === "match") {
          state.match = createMatch();
          render();
          return;
        }
        if (state.view === "miniExam") {
          state.miniExam = createMiniExam();
          render();
          return;
        }
        if (state.view === "progress") {
          render();
          return;
        }
        if (state.view === "notebook") {
          const items = filteredNotebookItems();
          if (state.notebook.mode === "study" && items.length) {
            state.notebook.studyIndex = Math.floor(Math.random() * items.length);
            state.notebook.studyFlipped = false;
          }
          render();
          return;
        }
        const cards = cardList();
        for (let i = cards.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        state.cardIndex = 0;
        state.flipped = false;
        render();
      };

      const hanziiUrl = (card) =>
        `https://hanzii.net/search/word/${encodeURIComponent(card?.front || "")}?hl=vi`;

      const openHanzii = () => {
        const card = state.view === "quiz" ? state.quiz?.card : currentCard();
        if (!card?.front) return;
        window.open(hanziiUrl(card), "_blank", "noopener,noreferrer");
      };

      const exportLessons = () => {
        const payload = JSON.stringify({ lessons: state.lessons }, null, 2);
        const blob = new Blob([payload], {
          type: "application/json;charset=utf-8",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "hsk_flashcards_edited.json";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      };

      const resetData = () => {
        if (
          !window.confirm(
            "Đặt lại dữ liệu về bản HSK5 gốc? Các chỉnh sửa đã lưu trên trình duyệt sẽ bị xóa.",
          )
        )
          return;
        localStorage.removeItem(STORAGE_KEY);
        setLessons(window.HSK5_FLASHCARD_DATA?.lessons || []);
      };

      const updateVoices = () => {
        state.voices = window.speechSynthesis
          ? speechSynthesis.getVoices()
          : [];
      };

      const speakChinese = () => {
        const matchPair =
          state.match?.pairs.find(
            (pair) => pair.id === state.match?.selectedLeft,
          ) ||
          state.match?.pairs.find(
            (pair) => !state.match.matched.includes(pair.id),
          );
        const card =
          state.view === "quiz"
            ? state.quiz?.card
            : state.view === "match"
              ? matchPair?.card
              : currentCard();
        if (!card || !window.speechSynthesis) return;
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(card.front);
        utterance.lang = "zh-CN";
        const voice = state.voices.find((item) =>
          /zh|Chinese|Mandarin|普通话|中文/i.test(`${item.lang} ${item.name}`),
        );
        if (voice) utterance.voice = voice;
        utterance.rate = 0.85;
        speechSynthesis.speak(utterance);
      };

      const parseExcelRows = (rows, sheetName) => {
        if (!rows.length) return [];
        const headers = rows[0].map((header) =>
          normalize(header).toLowerCase(),
        );
        const findColumn = (...names) =>
          names
            .map((name) => headers.indexOf(name))
            .find((index) => index >= 0);
        const frontIndex = findColumn(
          "front",
          "hanzi",
          "中文",
          "chữ hán",
          "chu han",
          "từ vựng",
          "tu vung",
        );
        const backIndex = findColumn(
          "back",
          "nghĩa",
          "nghia",
          "meaning",
          "tiếng việt",
          "tieng viet",
          "chỉ nghĩa",
          "chi nghia",
        );
        const pinyinIndex = findColumn(
          "pinyin",
          "拼音",
          "chữ pinyin",
          "chu pinyin",
        );
        const exampleIndex = findColumn("example", "ví dụ", "vi du", "例句");
        if (frontIndex === undefined || backIndex === undefined) {
          throw new Error(
            "Excel cần có cột Front và Back. Có thể dùng thêm Pinyin, Example.",
          );
        }
        return rows.slice(1).map((row) => {
          const fallback = splitCardBack(row[backIndex]);
          return {
            front: row[frontIndex],
            pinyin:
              pinyinIndex === undefined ? fallback.pinyin : row[pinyinIndex],
            back:
              pinyinIndex === undefined
                ? fallback.back || row[backIndex]
                : row[backIndex],
            example:
              exampleIndex === undefined ? fallback.example : row[exampleIndex],
            rawBack: row[backIndex],
            lesson: sheetName,
          };
        });
      };

      const handleExcel = async (file) => {
        el.fileError.textContent = "";
        if (!window.XLSX) {
          el.fileError.textContent =
            "Chưa tải được thư viện đọc Excel. Hãy mở file khi có Internet hoặc dùng dữ liệu HSK5 có sẵn.";
          return;
        }
        try {
          const buffer = await file.arrayBuffer();
          const workbook = XLSX.read(buffer, {
            type: "array",
            cellText: false,
            cellDates: true,
          });
          const lessons = workbook.SheetNames.map((name) => {
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[name], {
              header: 1,
              raw: false,
              defval: "",
              blankrows: false,
            });
            return { name, cards: parseExcelRows(rows, name) };
          });
          setLessons(lessons);
          saveLessons();
        } catch (error) {
          el.fileError.textContent = error.message || String(error);
        }
      };

      el.lessonSelect.addEventListener("change", () => {
        state.lessonIndex = Number(el.lessonSelect.value);
        state.cardIndex = 0;
        state.flipped = false;
        state.quiz = null;
        state.match = null;
        state.miniExam = null;
        render();
      });
      el.showPinyin.addEventListener("click", () => {
        state.showPinyin = true;
        render();
      });
      el.hidePinyin.addEventListener("click", () => {
        state.showPinyin = false;
        render();
      });
      el.viewButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.view = button.dataset.view;
          state.flipped = false;
          state.quiz = null;
          state.match = null;
          state.miniExam = null;
          state.practiceCounts = {};
          render();
        });
      });
      el.quizButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.quizDirection = button.dataset.quizDirection;
          state.view = "quiz";
          state.quiz = null;
          render();
        });
      });
      el.modeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.mode = button.dataset.mode;
          state.flipped = false;
          render();
        });
      });
      el.reviewAllButton?.addEventListener("click", () => {
        state.reviewDifficultOnly = false;
        state.cardIndex = 0;
        state.practiceCounts = {};
        state.quiz = null;
        state.match = null;
        state.miniExam = null;
        render();
      });
      el.reviewDifficultButton?.addEventListener("click", () => {
        state.reviewDifficultOnly = true;
        state.cardIndex = 0;
        state.practiceCounts = {};
        state.quiz = null;
        state.match = null;
        state.miniExam = null;
        render();
      });
      el.lightThemeButton?.addEventListener("click", () => {
        state.theme = "light";
        saveTheme();
        render();
      });
      el.darkThemeButton?.addEventListener("click", () => {
        state.theme = "dark";
        saveTheme();
        render();
      });
      el.flipButton.addEventListener("click", () => {
        if (state.view === "flashcard") {
          if (!state.flipped) {
            state.flipped = true;
            markCardViewed(currentCard());
            incrementProgress("flashcards");
          } else {
            state.flipped = false;
          }
        }
        if (state.view === "quiz") {
          state.quiz = createQuiz();
          incrementProgress("quizzes");
        }
        if (state.view === "match") {
          state.match = createMatch();
          incrementProgress("matches");
        }
        if (state.view === "miniExam") {
          if (state.miniExam?.submitted) {
            state.miniExam = createMiniExam();
          } else if (state.miniExam?.questions.length) {
            submitMiniExam();
          }
        }
        if (state.view === "progress") {
          saveStudyTime();
        }
        if (state.view === "notebook") {
          if (state.notebook.mode === "study") {
            state.notebook.studyFlipped = !state.notebook.studyFlipped;
          }
        }
        render();
      });
      el.prevButton.addEventListener("click", () => nextPractice(-1));
      el.nextButton.addEventListener("click", () => nextPractice(1));
      el.shuffleButton.addEventListener("click", shuffleCards);
      el.speakButton.addEventListener("click", speakChinese);
      el.hanziiButton.addEventListener("click", openHanzii);
      el.cardContent.addEventListener("click", (event) => {
        const markButton = event.target.closest("#markButton");
        if (markButton) {
          toggleMarkCard(currentCard());
          return;
        }
        const difficultButton = event.target.closest("#difficultButton");
        if (difficultButton) {
          toggleDifficultCard(currentCard());
          return;
        }
        const addCurrentNotebook = event.target.closest("[data-add-current-notebook]");
        if (addCurrentNotebook) {
          upsertNotebookItem(notebookItemFromCard(currentLearningCard()));
          render();
          return;
        }
        const favoriteCurrent = event.target.closest("[data-favorite-current]");
        if (favoriteCurrent) {
          upsertNotebookItem(notebookItemFromCard(currentLearningCard(), true), {
            favorite: true,
          });
          render();
          return;
        }
        const notebookSaveButton = event.target.closest("[data-notebook-save]");
        if (notebookSaveButton) {
          saveNotebookForm();
          return;
        }
        const notebookClearButton = event.target.closest("[data-notebook-clear]");
        if (notebookClearButton) {
          state.notebook.editingId = "";
          render();
          return;
        }
        const notebookEditButton = event.target.closest("[data-notebook-edit]");
        if (notebookEditButton) {
          state.notebook.editingId = notebookEditButton.dataset.notebookEdit;
          state.notebook.mode = "list";
          render();
          return;
        }
        const notebookDeleteButton = event.target.closest("[data-notebook-delete]");
        if (notebookDeleteButton) {
          removeNotebookItem(notebookDeleteButton.dataset.notebookDelete);
          render();
          return;
        }
        const notebookFavoriteButton = event.target.closest("[data-notebook-favorite]");
        if (notebookFavoriteButton) {
          const item = state.notebook.items.find(
            (entry) => entry.id === notebookFavoriteButton.dataset.notebookFavorite,
          );
          if (item) {
            item.favorite = !item.favorite;
            saveNotebook();
            showToast(item.favorite ? "Đã đánh dấu yêu thích." : "Đã bỏ yêu thích.");
            render();
          }
          return;
        }
        const notebookModeButton = event.target.closest("[data-notebook-mode]");
        if (notebookModeButton) {
          state.notebook.mode = notebookModeButton.dataset.notebookMode;
          state.notebook.studyFlipped = false;
          render();
          return;
        }
        const notebookRandomButton = event.target.closest("[data-notebook-random]");
        if (notebookRandomButton) {
          const items = filteredNotebookItems();
          if (items.length) state.notebook.studyIndex = Math.floor(Math.random() * items.length);
          state.notebook.studyFlipped = false;
          render();
          return;
        }
        const notebookAutoFlipButton = event.target.closest("[data-notebook-autoflip]");
        if (notebookAutoFlipButton) {
          state.notebook.autoFlip = !state.notebook.autoFlip;
          render();
          return;
        }
        const notebookFavOnlyButton = event.target.closest("[data-notebook-favonly]");
        if (notebookFavOnlyButton) {
          state.notebook.favoriteOnly = !state.notebook.favoriteOnly;
          state.notebook.studyIndex = 0;
          state.notebook.studyFlipped = false;
          render();
          return;
        }
        if (event.target.closest("[data-notebook-export-json]")) {
          exportNotebookJson();
          return;
        }
        if (event.target.closest("[data-notebook-export-xlsx]")) {
          exportNotebookExcel();
          return;
        }
        const addButton = event.target.closest("#addCardButton");
        if (addButton) {
          const lesson = state.lessons[state.lessonIndex];
          lesson.cards.unshift({
            front: "新词",
            pinyin: "",
            back: "Nghĩa mới",
            example: "",
            rawBack: "",
            lesson: lesson.name,
          });
          state.cardIndex = 0;
          resetPractice();
          saveLessons();
          render();
          return;
        }
        const exportButton = event.target.closest("#exportDataButton");
        if (exportButton) {
          exportLessons();
          return;
        }
        const resetButton = event.target.closest("#resetDataButton");
        if (resetButton) {
          resetData();
          return;
        }
        const deleteButton = event.target.closest("[data-delete-card]");
        if (deleteButton) {
          const index = Number(deleteButton.dataset.deleteCard);
          const lesson = state.lessons[state.lessonIndex];
          lesson.cards.splice(index, 1);
          resetPractice();
          saveLessons();
          render();
          return;
        }
        const quizButton = event.target.closest("[data-quiz-choice]");
        if (quizButton && state.quiz && !state.quiz.answered) {
          state.quiz.selected = quizButton.dataset.quizChoice;
          state.quiz.answered = true;
          trackAnswerResult(
            state.quiz.card,
            state.quiz.selected === state.quiz.correct,
          );
          render();
          return;
        }
        const miniChoiceButton = event.target.closest("[data-mini-choice]");
        if (
          miniChoiceButton &&
          state.miniExam &&
          !state.miniExam.submitted
        ) {
          state.miniExam.answers[state.miniExam.currentIndex] =
            miniChoiceButton.dataset.miniChoice;
          render();
          return;
        }
        const miniSubmitButton = event.target.closest("[data-mini-submit]");
        if (miniSubmitButton && state.miniExam) {
          submitMiniExam();
          render();
          return;
        }
        const miniRestartButton = event.target.closest("[data-mini-restart]");
        if (miniRestartButton) {
          state.miniExam = createMiniExam();
          render();
          return;
        }
        const leftButton = event.target.closest("[data-match-left]");
        if (leftButton && state.match) {
          state.match.selectedLeft = leftButton.dataset.matchLeft;
          state.match.message = "Bây giờ chọn nghĩa tiếng Việt tương ứng.";
          render();
          return;
        }
        const rightButton = event.target.closest("[data-match-right]");
        if (rightButton && state.match) {
          const rightId = rightButton.dataset.matchRight;
          if (!state.match.selectedLeft) {
            state.match.message = "Hãy chọn thẻ chữ Hán trước.";
          } else if (state.match.selectedLeft === rightId) {
            state.match.matched.push(rightId);
            state.match.selectedLeft = "";
            state.match.message =
              state.match.matched.length === state.match.pairs.length
                ? "Hoàn thành. Bấm Trộn để chơi ván mới."
                : "Đúng rồi. Ghép tiếp cặp khác.";
          } else {
            state.match.selectedLeft = "";
            state.match.message = "Chưa đúng, thử lại nhé.";
          }
          render();
        }
      });
      el.cardContent.addEventListener("input", (event) => {
        if (event.target.id === "notebookSearch") {
          state.notebook.query = event.target.value;
          state.notebook.studyIndex = 0;
          render();
          return;
        }
        const lesson = state.lessons[state.lessonIndex];
        if (!lesson) return;
        if (event.target.id === "lessonNameInput") {
          lesson.name = normalize(event.target.value) || lesson.name;
          lesson.cards.forEach((card) => {
            card.lesson = lesson.name;
          });
          renderLessonOptions();
          el.lessonSelect.value = String(state.lessonIndex);
          saveLessons();
          renderModeButtons();
          return;
        }
        const fieldInput = event.target.closest("[data-edit-field]");
        if (!fieldInput) return;
        const row = fieldInput.closest("[data-edit-index]");
        const card = lesson.cards[Number(row.dataset.editIndex)];
        if (!card) return;
        card[fieldInput.dataset.editField] = fieldInput.value.normalize("NFC");
        card.rawBack = [card.pinyin, card.back, card.example]
          .filter(Boolean)
          .join("\n");
        card.lesson = lesson.name;
        resetPractice();
        saveLessons();
      });
      el.cardContent.addEventListener("change", (event) => {
        if (event.target.id === "notebookLevelFilter") {
          state.notebook.levelFilter = event.target.value;
          state.notebook.studyIndex = 0;
          render();
          return;
        }
        if (event.target.id === "notebookSort") {
          state.notebook.sort = event.target.value;
          state.notebook.studyIndex = 0;
          render();
          return;
        }
        if (event.target.id === "notebookImportInput") {
          const file = event.target.files?.[0];
          if (file) importNotebookFile(file);
        }
      });
      el.excelInput.addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (file) handleExcel(file);
      });
      el.filterStatusButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.filterStatus = button.dataset.filterStatus;
          state.cardIndex = 0;
          state.quiz = null;
          state.match = null;
          state.miniExam = null;
          saveFilter();
          render();
        });
      });
      el.filterPracticeCountSelect.addEventListener("change", () => {
        state.filterPracticeCount = el.filterPracticeCountSelect.value;
        state.cardIndex = 0;
        state.quiz = null;
        state.match = null;
        state.miniExam = null;
        saveFilter();
        render();
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight") nextPractice(1);
        if (event.key === "ArrowLeft") nextPractice(-1);
        if (event.key === " ") {
          event.preventDefault();
          if (state.view === "flashcard") state.flipped = !state.flipped;
          if (state.view === "quiz") state.quiz = createQuiz();
          if (state.view === "match") state.match = createMatch();
          if (state.view === "miniExam") {
            if (state.miniExam?.submitted) state.miniExam = createMiniExam();
            else if (state.miniExam?.questions.length)
              submitMiniExam();
          }
          render();
        }
      });
      window.addEventListener("pagehide", saveStudyTime);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") saveStudyTime();
      });

      if (window.speechSynthesis) {
        updateVoices();
        speechSynthesis.addEventListener("voiceschanged", updateVoices);
      }

      const loadBundledData = () => {
        loadMarked();
        loadDifficult();
        loadViewed();
        loadProgress();
        loadLearningStats();
        loadNotebook();
        registerStudySession();
        loadTheme();
        loadFilter();
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            const savedLessons = parsed.lessons || parsed;
            const bundledLessons = window.HSK5_FLASHCARD_DATA?.lessons || [];
            if (bundledLessons.length) {
              const merged = mergeBundledLessons(savedLessons, bundledLessons);
              setLessons(merged.lessons);
              if (merged.added) saveLessons();
            } else {
              setLessons(savedLessons);
            }
            return;
          } catch (error) {
            localStorage.removeItem(STORAGE_KEY);
          }
        }
        if (window.HSK5_FLASHCARD_DATA?.lessons) {
          setLessons(cloneLessons(window.HSK5_FLASHCARD_DATA.lessons));
          return;
        }
        fetch("hsk5_flashcards_data.json", { cache: "no-store" })
          .then((response) => response.json())
          .then((data) => setLessons(data.lessons || []))
          .catch(() => {
            setLessons([
              {
                name: "M\u1eabu",
                cards: [
                  {
                    front: "\u4f60\u597d",
                    pinyin: "n\u01d0 h\u01ceo",
                    back: "Xin ch\u00e0o",
                    example:
                      "\u4f60\u597d\uff0c\u5f88\u9ad8\u5154\u8ba4\u8bc6\u4f60\u3002",
                    lesson: "M\u1eabu",
                  },
                ],
              },
            ]);
          });
      };

      loadBundledData();
    </script>
  </body>
</html>
