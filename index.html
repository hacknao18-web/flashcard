<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HSK Flashcards</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="hsk5_flashcards_data.js"></script>
    <style>
      :root {
        color-scheme: light;
        --ink: #24313a;
        --muted: #6a7884;
        --line: #dbe4e8;
        --paper: #fffdf8;
        --surface: #f4f1ea;
        --surface-strong: #fbfcfd;
        --panel: rgba(255, 253, 248, 0.92);
        --page-top: #f6f3ee;
        --page-bottom: #eef3f1;
        --accent: #6a7fd1;
        --accent-strong: #5166b8;
        --accent-soft: #eef2fb;
        --success: #4d8b7c;
        --warn: #b07a3f;
        --shadow: 0 18px 40px rgba(75, 88, 106, 0.1);
      }

      body.dark {
        color-scheme: dark;
        --ink: #edf2f7;
        --muted: #a7b3c2;
        --line: #334155;
        --paper: #111827;
        --surface: #1f2937;
        --surface-strong: #0f172a;
        --panel: rgba(17, 24, 39, 0.94);
        --page-top: #0b1220;
        --page-bottom: #162033;
        --accent: #8ea2ff;
        --accent-strong: #bac7ff;
        --accent-soft: #24314f;
        --success: #5eb7a2;
        --warn: #d0a26a;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: linear-gradient(
          180deg,
          var(--page-top) 0%,
          var(--page-bottom) 100%
        );
        color: var(--ink);
        font-family:
          "Noto Sans", "Noto Sans SC", "Noto Sans TC", "Segoe UI",
          "Microsoft YaHei", "PingFang SC", "Arial Unicode MS", Arial,
          sans-serif;
        line-height: 1.5;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .sidebar {
        background: var(--panel);
        border-right: 1px solid var(--line);
        padding: 22px;
        overflow: auto;
        backdrop-filter: blur(6px);
      }

      .brand {
        margin: 0 0 18px;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0;
        color: var(--accent);
      }

      .section {
        padding: 16px 0;
        border-top: 1px solid var(--line);
      }

      .section:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .progress-section {
        padding: 12px 0;
        border-top: 1px solid var(--line);
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #f0f0f0;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 6px;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent);
        transition: width 0.3s ease;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--muted);
      }

      .flashcard-progress {
        margin-top: 10px;
        padding: 8px;
        background: var(--surface);
        border-radius: 6px;
      }

      .flashcard-progress .progress-bar {
        margin-bottom: 4px;
      }

      label,
      .label {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      select,
      input[type="file"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-strong);
        color: var(--ink);
        padding: 10px 11px;
      }

      .segmented {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .chip,
      .tool-button {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-strong);
        color: var(--ink);
        padding: 9px 10px;
        cursor: pointer;
        transition:
          border-color 0.16s ease,
          background 0.16s ease,
          color 0.16s ease;
      }

      .chip[aria-pressed="true"],
      .tool-button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .tool-button.icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-width: 42px;
      }

      .tool-button.icon svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2.2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 10px;
        background: var(--surface-strong);
      }

      .stat strong {
        display: block;
        font-size: 22px;
        line-height: 1.1;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
      }

      .main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-width: 0;
        padding: 28px;
        gap: 20px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .title-block h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 42px);
        letter-spacing: 0;
      }

      .title-block p {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .stage {
        display: grid;
        place-items: center;
        min-height: 440px;
      }

      .card {
        width: min(760px, 100%);
        min-height: 390px;
        background: var(--paper);
        border: 0;
        border-bottom: 5px solid #d9dde8;
        border-radius: 10px;
        box-shadow: var(--shadow);
        padding: clamp(22px, 4vw, 42px);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 18px;
      }

      .card-progress-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .card-progress-header .progress-bar {
        height: 6px;
        margin: 0;
      }

      .card-progress-header .progress-label {
        font-size: 12px;
      }

      .card-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .hanzi {
        font-family:
          "Noto Sans SC", "Noto Sans TC", "Noto Sans", "Microsoft YaHei",
          "PingFang SC", "SimSun", sans-serif;
        font-size: clamp(44px, 9vw, 88px);
        line-height: 1.12;
        font-weight: 700;
        overflow-wrap: anywhere;
        text-align: center;
        letter-spacing: 0;
      }

      .card-content {
        display: grid;
        align-content: center;
        gap: 14px;
        min-width: 0;
      }

      .field {
        padding: 13px 15px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-strong);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .field strong {
        display: block;
        margin-bottom: 3px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .pinyin {
        font-size: clamp(22px, 3.4vw, 34px);
        text-align: center;
        color: var(--accent-strong);
      }

      .meaning {
        font-size: clamp(20px, 3vw, 30px);
        text-align: center;
      }

      .example {
        font-family:
          "Noto Sans", "Noto Sans SC", "Noto Sans TC", "Segoe UI", sans-serif;
        font-size: 18px;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .nav-buttons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      .error {
        margin-top: 10px;
        color: var(--warn);
        font-size: 13px;
        white-space: pre-wrap;
      }

      .practice-panel {
        width: min(860px, 100%);
        background: var(--paper);
        border: 0;
        border-radius: 10px;
        box-shadow: var(--shadow);
        padding: clamp(20px, 4vw, 36px);
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 16px;
      }

      .practice-panel > .progress-section {
        padding: 0;
        border-top: none;
        margin: 0;
      }

      .practice-panel > .progress-section .progress-bar {
        height: 6px;
        margin-bottom: 6px;
      }

      .quiz-question {
        margin: 0 0 20px;
        text-align: center;
        font-size: clamp(30px, 6vw, 58px);
        font-weight: 800;
        overflow-wrap: anywhere;
        letter-spacing: 0;
      }

      .quiz-question.meaning-prompt {
        font-size: clamp(24px, 4vw, 40px);
        color: var(--accent-strong);
      }

      .option-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .option-button,
      .match-button {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-strong);
        color: var(--ink);
        padding: 13px 14px;
        cursor: pointer;
        text-align: left;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .option-button.correct,
      .match-button.matched {
        border-color: var(--success);
        background: #dff3ef;
      }

      .option-button.wrong {
        border-color: #dc2626;
        background: #fee2e2;
      }

      .feedback {
        min-height: 28px;
        margin-top: 14px;
        color: var(--muted);
        font-weight: 700;
      }

      .mini-exam-header {
        display: grid;
        gap: 8px;
      }

      .mini-exam-meta,
      .mini-exam-score {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        flex-wrap: wrap;
      }

      .mini-exam-type {
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 4px 9px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 800;
      }

      .mini-exam-review {
        display: grid;
        gap: 10px;
        max-height: 56vh;
        overflow: auto;
        padding-right: 4px;
      }

      .mini-review-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        padding: 12px;
      }

      .mini-review-item.correct {
        border-color: var(--success);
      }

      .mini-review-item.wrong {
        border-color: #dc2626;
      }

      .mini-review-prompt {
        margin: 0 0 8px;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .mini-review-answer {
        margin: 3px 0;
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      .progress-dashboard {
        width: min(1080px, 100%);
        background: var(--paper);
        border-radius: 10px;
        box-shadow: var(--shadow);
        padding: clamp(18px, 3vw, 28px);
        display: grid;
        gap: 18px;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .dashboard-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        padding: 14px;
        min-height: 92px;
      }

      .dashboard-card strong {
        display: block;
        font-size: clamp(24px, 3vw, 34px);
        line-height: 1.1;
      }

      .dashboard-card span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .dashboard-section {
        display: grid;
        gap: 10px;
      }

      .dashboard-section h2 {
        margin: 0;
        font-size: 18px;
      }

      .level-row {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr) 72px;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 13px;
      }

      .chart-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .chart-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        padding: 12px;
        min-height: 260px;
      }

      .chart-box canvas {
        width: 100%;
        height: 220px;
      }

      .wrong-word-list {
        display: grid;
        gap: 8px;
        max-height: 360px;
        overflow: auto;
        padding-right: 4px;
      }

      .wrong-word-item {
        display: grid;
        grid-template-columns: minmax(96px, 0.6fr) minmax(130px, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        padding: 10px;
      }

      .wrong-word-item strong,
      .wrong-word-item span {
        overflow-wrap: anywhere;
      }

      .wrong-word-item em {
        color: var(--warn);
        font-style: normal;
        font-weight: 800;
      }

      .notebook-panel {
        width: min(1120px, 100%);
        background: var(--paper);
        border-radius: 10px;
        box-shadow: var(--shadow);
        padding: clamp(18px, 3vw, 28px);
        display: grid;
        gap: 16px;
      }

      .notebook-toolbar,
      .notebook-actions,
      .notebook-study-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .notebook-toolbar {
        justify-content: space-between;
      }

      .notebook-controls {
        display: grid;
        grid-template-columns: minmax(180px, 1.3fr) minmax(120px, 0.7fr) minmax(120px, 0.7fr);
        gap: 8px;
        flex: 1;
      }

      .notebook-controls input,
      .notebook-controls select,
      .notebook-form input,
      .notebook-form select,
      .notebook-form textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-strong);
        color: var(--ink);
        padding: 10px 11px;
        font: inherit;
      }

      .notebook-form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        padding: 12px;
      }

      .notebook-form textarea,
      .notebook-form .full-row {
        grid-column: 1 / -1;
      }

      .notebook-form textarea {
        min-height: 72px;
        resize: vertical;
      }

      .notebook-list {
        display: grid;
        gap: 10px;
        max-height: 58vh;
        overflow: auto;
        padding-right: 4px;
      }

      .notebook-item {
        display: grid;
        grid-template-columns: minmax(130px, 0.9fr) minmax(0, 1.3fr) auto;
        gap: 12px;
        align-items: start;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        padding: 12px;
      }

      .notebook-word {
        display: grid;
        gap: 4px;
      }

      .notebook-word strong {
        font-size: 26px;
        line-height: 1.15;
        overflow-wrap: anywhere;
      }

      .notebook-word span,
      .notebook-meta,
      .notebook-note {
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .notebook-detail {
        display: grid;
        gap: 6px;
      }

      .notebook-badge {
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 800;
      }

      .notebook-study-card {
        min-height: 360px;
        display: grid;
        place-items: center;
        gap: 14px;
        text-align: center;
      }

      .notebook-study-card .hanzi {
        font-size: clamp(54px, 10vw, 96px);
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 20;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink);
        box-shadow: var(--shadow);
        padding: 12px 14px;
        font-weight: 700;
      }

      .match-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .match-column {
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .match-column h2 {
        margin: 0 0 4px;
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .match-button.selected {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 2px rgba(15, 118, 110, 0.18);
      }

      .option-button.selected {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 2px rgba(81, 102, 184, 0.22);
      }

      .match-button[disabled],
      .option-button[disabled] {
        cursor: default;
      }

      .editor-panel {
        width: min(1080px, 100%);
        background: var(--paper);
        border-radius: 10px;
        box-shadow: var(--shadow);
        padding: clamp(18px, 3vw, 28px);
      }

      .editor-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .editor-list {
        display: grid;
        gap: 12px;
        max-height: 68vh;
        overflow: auto;
        padding-right: 4px;
      }

      .edit-row {
        display: grid;
        grid-template-columns:
          minmax(120px, 0.9fr) minmax(120px, 0.9fr) minmax(140px, 1.1fr)
          minmax(160px, 1.4fr) auto;
        gap: 8px;
        align-items: start;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
      }

      .edit-row input,
      .edit-row textarea,
      .lesson-name-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-strong);
        color: var(--ink);
        padding: 9px 10px;
        font: inherit;
      }

      .edit-row textarea {
        min-height: 72px;
        resize: vertical;
      }

      .lesson-name-input {
        max-width: 320px;
        font-weight: 700;
      }

      .hanzii-container {
        width: 100%;
        height: 400px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        margin-top: 12px;
        background: var(--surface-strong);
      }

      .hanzii-container iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      @media (max-width: 880px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .main {
          padding: 20px;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .actions {
          justify-content: flex-start;
        }

        .option-grid,
        .dashboard-grid,
        .chart-grid,
        .notebook-controls,
        .notebook-form,
        .match-grid,
        .edit-row {
          grid-template-columns: 1fr;
        }

        .level-row,
        .notebook-item,
        .wrong-word-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1 class="brand">中文 Flashcards</h1>

        <div class="section">
          <label for="lessonSelect">Bài học</label>
          <select id="lessonSelect"></select>
        </div>

        <div class="section">
          <span class="label">Kiểu học</span>
          <div class="mode-grid">
            <button
              class="chip"
              data-view="flashcard"
              type="button"
              aria-pressed="true"
            >
              Flashcard
            </button>
            <button
              class="chip"
              data-view="quiz"
              type="button"
              aria-pressed="false"
            >
              Trắc nghiệm
            </button>
            <button
              class="chip"
              data-view="match"
              type="button"
              aria-pressed="false"
            >
              Ghép thẻ
            </button>
            <button
              class="chip"
              data-view="miniExam"
              type="button"
              aria-pressed="false"
            >
              Thi thử HSK mini
            </button>
            <button
              class="chip"
              data-view="notebook"
              type="button"
              aria-pressed="false"
            >
              &#128218; Sổ tay từ vựng
            </button>
            <button
              class="chip"
              data-view="progress"
              type="button"
              aria-pressed="false"
            >
              📊 Tiến độ học tập
            </button>
            <button
              class="chip"
              data-view="manage"
              type="button"
              aria-pressed="false"
            >
              Quản lý
            </button>
          </div>
        </div>

        <div class="section">
          <span class="label">Hướng trắc nghiệm</span>
          <div class="segmented">
            <button
              class="chip"
              data-quiz-direction="zh-vi"
              type="button"

        <div class="section">

        </div>

        <div class="section">
          <span class="label">Bộ lọc thông minh</span>
          <div class="mode-grid">
            <button
              class="chip"

            <button

            <option value="3-5">3–5 lần</option>

        <div class="section">

          <div class="mode-grid">
            <button
              class="chip"
              id="reviewAllButton"

              aria-pressed="true"
            >
              Tất cả từ

            <button
              class="chip"
              id="reviewDifficultButton"
              type="button"

              Chỉ từ khó

              class="chip"
              id="darkThemeButton"
              type="button"
              aria-pressed="false"
            >

        <div class="section stats">
          <div class="stat">
            <strong id="cardCount">0</strong>

          <div class="stat">
            <strong id="lessonCount">0</strong>
            <span>Bài</span>
          </div>
        </div>

      <main class="main">
        <header class="topbar">
          <div class="title-block">
            <h1 id="lessonTitle">HSK5</h1>
            <p id="progressText">0 / 0</p>
          </div>
          <div class="actions">
            <button class="tool-button" id="shuffleButton" type="button">
              Trộn
            </button>
            <button
              class="tool-button icon"
              id="speakButton"
              type="button"
              title="Đọc tiếng Trung"
              aria-label="Đọc tiếng Trung"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
                <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
                <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
              </svg>
            </button>
            <button
              class="tool-button icon"
              id="hanziiButton"
              type="button"
              title="Mở từ này trên Hanzii"
              aria-label="Mở từ này trên Hanzii"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M10 13a5 5 0 0 0 7.1 0l2.1-2.1a5 5 0 0 0-7.1-7.1L11 4.9"
                ></path>
                <path
                  d="M14 11a5 5 0 0 0-7.1 0l-2.1 2.1a5 5 0 0 0 7.1 7.1L13 19.1"
                ></path>

        <section class="stage" aria-live="polite">
          <article class="card">
            <div class="card-meta">
              <span id="cardLesson">Lesson</span>
              <span id="cardIndex">0 / 0</span>
            </div>

            <div class="card-content" id="cardContent"></div>

            <footer class="card-footer">
              <span class="hint"
                >Bấm “Lật thẻ” hoặc đổi chế độ ở bên trái.</span
              >
              <div class="nav-buttons">
                <button class="tool-button" id="prevButton" type="button">
                  Trước
                </button>
                <button
                  class="tool-button primary"
                  id="flipButton"
                  type="button"
                >
                  Lật thẻ
                </button>
                <button class="tool-button" id="nextButton" type="button">
                  Tiếp
                </button>
              </div>
            </footer>
          </article>
        </section>
      </main>
    </div>

    <script>
      const state = {
        lessons: [],
        lessonIndex: 0,
        cardIndex: 0,
        flipped: false,
        showPinyin: true,
        mode: "hanzi",
        view: "flashcard",
        quizDirection: "zh-vi",
        quiz: null,
        match: null,
        miniExam: null,
        voices: [],
        markedCards: new Set(),
        difficultCards: new Set(),
        viewedCards: new Set(),
        progress: { flashcards: 0, quizzes: 0, matches: 0 },
        learningStats: {
          correctAnswers: 0,
          wrongAnswers: 0,
          studyTimeSeconds: 0,
          totalSessions: 0,
          streak: 0,
          lastStudyDate: "",
          daily: {},
          cardStats: {},
          masteredCards: [],
        },
        sessionStartedAt: Date.now(),
        chartInstances: {},
        notebook: {
          items: [],
          query: "",
          levelFilter: "all",
          sort: "newest",
          favoriteOnly: false,
          mode: "list",
          editingId: "",
          studyIndex: 0,
          studyFlipped: false,
          autoFlip: false,
          autoTimer: null,
        },
        practiceCounts: {},
        reviewDifficultOnly: false,
        theme: "light",
        filterStatus: "all",
        filterPracticeCount: "all",
      };
      const STORAGE_KEY = "hsk_flashcard_lessons_v2";
      const MARKED_KEY = "hsk_flashcard_marked_v1";
      const DIFFICULT_KEY = "hsk_flashcard_difficult_v1";
      const VIEWED_KEY = "hsk_flashcard_viewed_v1";
      const PROGRESS_KEY = "hsk_flashcard_progress_v1";
      const LEARNING_STATS_KEY = "hsk_learning_stats_v1";
      const NOTEBOOK_KEY = "hsk_vocab_notebook_v1";
      const THEME_KEY = "hsk_flashcard_theme_v1";
      const FILTER_KEY = "hsk_flashcard_filter_v1";

      const el = {
        lessonSelect: document.querySelector("#lessonSelect"),
        lessonTitle: document.querySelector("#lessonTitle"),
        progressText: document.querySelector("#progressText"),
        cardLesson: document.querySelector("#cardLesson"),
        cardIndex: document.querySelector("#cardIndex"),
        cardContent: document.querySelector("#cardContent"),
        cardCount: document.querySelector("#cardCount"),
        lessonCount: document.querySelector("#lessonCount"),
        fileError: document.querySelector("#fileError"),
        excelInput: document.querySelector("#excelInput"),
        showPinyin: document.querySelector("#showPinyin"),
        hidePinyin: document.querySelector("#hidePinyin"),
        reviewAllButton: document.querySelector("#reviewAllButton"),
        reviewDifficultButton: document.querySelector("#reviewDifficultButton"),
        lightThemeButton: document.querySelector("#lightThemeButton"),
        darkThemeButton: document.querySelector("#darkThemeButton"),
        flipButton: document.querySelector("#flipButton"),
        prevButton: document.querySelector("#prevButton"),
        nextButton: document.querySelector("#nextButton"),
        shuffleButton: document.querySelector("#shuffleButton"),
        speakButton: document.querySelector("#speakButton"),
        hanziiButton: document.querySelector("#hanziiButton"),
        modeButtons: [...document.querySelectorAll("[data-mode]")],
        viewButtons: [...document.querySelectorAll("[data-view]")],
        quizButtons: [...document.querySelectorAll("[data-quiz-direction]")],
        filterStatusButtons: [
          ...document.querySelectorAll("[data-filter-status]"),
        ],
        filterPracticeCountSelect: document.querySelector(
          "#filterPracticeCount",
        ),
        filterInfo: document.querySelector("#filterInfo"),
      };

      const getCardId = (card) => `${card.lesson}|${card.front}`;

      const loadMarked = () => {
        try {
          const saved = localStorage.getItem(MARKED_KEY);
          if (saved) state.markedCards = new Set(JSON.parse(saved));
        } catch (error) {
          state.markedCards = new Set();
        }
      };

      const saveMarked = () => {
        try {
          localStorage.setItem(
            MARKED_KEY,
            JSON.stringify([...state.markedCards]),
          );
        } catch (error) {}
      };

      const loadDifficult = () => {
        try {
          const saved = localStorage.getItem(DIFFICULT_KEY);
          if (saved) state.difficultCards = new Set(JSON.parse(saved));
        } catch (error) {
          state.difficultCards = new Set();
        }
      };

      const saveDifficult = () => {
        try {
          localStorage.setItem(
            DIFFICULT_KEY,
            JSON.stringify([...state.difficultCards]),
          );
        } catch (error) {}
      };

      const loadViewed = () => {
        try {
          const saved = localStorage.getItem(VIEWED_KEY);
          if (saved) state.viewedCards = new Set(JSON.parse(saved));
        } catch (error) {
          state.viewedCards = new Set();
        }
      };

      const saveViewed = () => {
        try {
          localStorage.setItem(
            VIEWED_KEY,
            JSON.stringify([...state.viewedCards]),
          );
        } catch (error) {}
      };

      const loadProgress = () => {
        try {
          const saved = localStorage.getItem(PROGRESS_KEY);
          if (saved)
            state.progress = { ...state.progress, ...JSON.parse(saved) };
        } catch (error) {
          state.progress = { flashcards: 0, quizzes: 0, matches: 0 };
        }
      };

      const defaultLearningStats = () => ({
        correctAnswers: 0,
        wrongAnswers: 0,
        studyTimeSeconds: 0,
        totalSessions: 0,
        streak: 0,
        lastStudyDate: "",
        daily: {},
        cardStats: {},
        masteredCards: [],
      });

      const normalizeLearningStats = (stats) => ({
        ...defaultLearningStats(),
        ...(stats || {}),
        daily: { ...(stats?.daily || {}) },
        cardStats: { ...(stats?.cardStats || {}) },
        masteredCards: Array.isArray(stats?.masteredCards)
          ? stats.masteredCards
          : [],
      });

      const loadLearningStats = () => {
        try {
          const saved = localStorage.getItem(LEARNING_STATS_KEY);
          state.learningStats = normalizeLearningStats(
            saved ? JSON.parse(saved) : null,
          );
        } catch (error) {
          state.learningStats = defaultLearningStats();
        }
      };

      const saveLearningStats = () => {
        try {
          localStorage.setItem(
            LEARNING_STATS_KEY,
            JSON.stringify(state.learningStats),
          );
        } catch (error) {}
      };

      const normalizeNotebookItem = (item = {}) => ({
        id: normalize(item.id) || `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        hanzi: normalize(item.hanzi || item.front),
        pinyin: normalize(item.pinyin),
        meaning: normalize(item.meaning || item.back),
        hskLevel: normalize(item.hskLevel || item.level || item.lesson || "HSK"),
        example: normalize(item.example),
        addedAt: normalize(item.addedAt) || new Date().toISOString(),
        note: normalize(item.note),
        favorite: Boolean(item.favorite),
      });

      const loadNotebook = () => {
        try {
          const saved = localStorage.getItem(NOTEBOOK_KEY);
          state.notebook.items = saved
            ? JSON.parse(saved).map(normalizeNotebookItem).filter((item) => item.hanzi)
            : [];
        } catch (error) {
          state.notebook.items = [];
        }
      };

      const saveNotebook = () => {
        try {
          localStorage.setItem(NOTEBOOK_KEY, JSON.stringify(state.notebook.items));
        } catch (error) {}
      };

      const showToast = (message) => {
        document.querySelector(".toast")?.remove();
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = message;
        document.body.append(toast);
        window.setTimeout(() => toast.remove(), 2200);
      };

      const hskLevelFromCard = (card) => inferHskLevel(card || {});

      const notebookItemFromCard = (card, favorite = false) => {
        if (!card) return null;
        return normalizeNotebookItem({
          hanzi: card.front,
          pinyin: card.pinyin,
          meaning: card.back,
          hskLevel: hskLevelFromCard(card),
          example: card.example,
          note: "",
          favorite,
        });
      };

      const findNotebookItem = (item) =>
        state.notebook.items.find(
          (saved) =>
            saved.hanzi === item.hanzi &&
            (saved.pinyin === item.pinyin || saved.meaning === item.meaning),
        );

      const upsertNotebookItem = (item, options = {}) => {
        if (!item) {
          showToast("Chưa có từ để thêm vào sổ tay.");
          return null;
        }
        const normalized = normalizeNotebookItem(item);
        if (!normalized.hanzi) return null;
        const existing = findNotebookItem(normalized);
        if (existing) {
          Object.assign(existing, {
            ...existing,
            ...normalized,
            id: existing.id,
            addedAt: existing.addedAt || normalized.addedAt,
            favorite: options.favorite ? true : normalized.favorite || existing.favorite,
          });
          saveNotebook();
          if (!options.silent)
            showToast(options.favorite ? "Đã thêm vào yêu thích." : "Đã cập nhật sổ tay.");
          return existing;
        }
        normalized.favorite = options.favorite ? true : normalized.favorite;
        state.notebook.items.unshift(normalized);
        saveNotebook();
        if (!options.silent)
          showToast(options.favorite ? "Đã thêm vào yêu thích." : "Đã thêm vào sổ tay.");
        return normalized;
      };

      const removeNotebookItem = (id) => {
        state.notebook.items = state.notebook.items.filter((item) => item.id !== id);
        saveNotebook();
        showToast("Đã xóa từ khỏi sổ tay.");
      };

      const currentLearningCard = () => {
        if (state.view === "quiz") return state.quiz?.card || null;
        if (state.view === "miniExam") {
          const question = state.miniExam?.questions[state.miniExam.currentIndex];
          return question?.card || null;
        }
        return currentCard();
      };

      const notebookLevels = () => [
        ...new Set(
          state.notebook.items
            .map((item) => item.hskLevel)
            .filter(Boolean)
            .sort((a, b) => a.localeCompare(b, "vi")),
        ),
      ];

      const filteredNotebookItems = () => {
        const query = normalize(state.notebook.query).toLowerCase();
        const filtered = state.notebook.items.filter((item) => {
          const matchesQuery =
            !query ||
            [item.hanzi, item.pinyin, item.meaning]
              .join(" ")
              .toLowerCase()
              .includes(query);
          const matchesLevel =
            state.notebook.levelFilter === "all" ||
            item.hskLevel === state.notebook.levelFilter;
          const matchesFavorite =
            !state.notebook.favoriteOnly || item.favorite;
          return matchesQuery && matchesLevel && matchesFavorite;
        });
        return filtered.sort((a, b) => {
          if (state.notebook.sort === "oldest") {
            return new Date(a.addedAt) - new Date(b.addedAt);
          }
          if (state.notebook.sort === "az") {
            return a.hanzi.localeCompare(b.hanzi, "zh-Hans");
          }
          return new Date(b.addedAt) - new Date(a.addedAt);
        });
      };

      const dateKey = (date = new Date()) => {
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${date.getFullYear()}-${month}-${day}`;
      };

      const daysBetween = (from, to) => {
        if (!from || !to) return 0;
        const start = new Date(`${from}T00:00:00`);
        const end = new Date(`${to}T00:00:00`);
        return Math.round((end - start) / 86400000);
      };

      const registerStudySession = () => {
        const today = dateKey();
        const last = state.learningStats.lastStudyDate;
        state.learningStats.totalSessions += 1;
        if (last !== today) {
          state.learningStats.streak =
            daysBetween(last, today) === 1
              ? state.learningStats.streak + 1
              : 1;
          state.learningStats.lastStudyDate = today;
        }
        if (!state.learningStats.daily[today]) {
          state.learningStats.daily[today] = {
            correct: 0,
            wrong: 0,
            seconds: 0,
            learned: 0,
          };
        }
        saveLearningStats();
      };

      const saveStudyTime = () => {
        const elapsed = Math.max(
          0,
          Math.round((Date.now() - state.sessionStartedAt) / 1000),
        );
        if (!elapsed) return;
        const today = dateKey();
        if (!state.learningStats.daily[today]) {
          state.learningStats.daily[today] = {
            correct: 0,
            wrong: 0,
            seconds: 0,
            learned: 0,
          };
        }
        state.learningStats.studyTimeSeconds += elapsed;
        state.learningStats.daily[today].seconds =
          (state.learningStats.daily[today].seconds || 0) + elapsed;
        state.sessionStartedAt = Date.now();
        saveLearningStats();
      };

      const formatDuration = (seconds) => {
        const total = Math.max(0, Number(seconds) || 0);
        const hours = Math.floor(total / 3600);
        const minutes = Math.floor((total % 3600) / 60);
        if (hours) return `${hours} giờ ${minutes} phút`;
        return `${minutes} phút`;
      };

      const loadTheme = () => {
        try {
          const saved = localStorage.getItem(THEME_KEY);
          if (saved === "dark" || saved === "light") state.theme = saved;
        } catch (error) {
          state.theme = "light";
        }
      };

      const loadFilter = () => {
        try {
          const saved = localStorage.getItem(FILTER_KEY);
          if (saved) {
            const filter = JSON.parse(saved);
            if (filter.status) state.filterStatus = filter.status;
            if (filter.practiceCount)
              state.filterPracticeCount = filter.practiceCount;
          }
        } catch (error) {
          state.filterStatus = "all";
          state.filterPracticeCount = "all";
        }
      };

      const saveFilter = () => {
        try {
          localStorage.setItem(
            FILTER_KEY,
            JSON.stringify({
              status: state.filterStatus,
              practiceCount: state.filterPracticeCount,
            }),
          );
        } catch (error) {}
      };

      const saveTheme = () => {
        try {
          localStorage.setItem(THEME_KEY, state.theme);
        } catch (error) {}
      };

      const applyTheme = () => {
        document.body.classList.toggle("dark", state.theme === "dark");
      };

      const saveProgress = () => {
        try {
          localStorage.setItem(PROGRESS_KEY, JSON.stringify(state.progress));
        } catch (error) {}
      };

      const markCardViewed = (card) => {
        if (!card) return;
        const id = getCardId(card);
        const wasViewed = state.viewedCards.has(id);
        state.viewedCards.add(id);
        if (!wasViewed) {
          const today = dateKey();
          if (!state.learningStats.daily[today]) {
            state.learningStats.daily[today] = {
              correct: 0,
              wrong: 0,
              seconds: 0,
              learned: 0,
            };
          }
          state.learningStats.daily[today].learned =
            (state.learningStats.daily[today].learned || 0) + 1;
          saveLearningStats();
        }
        saveViewed();
      };

      const toggleMarkCard = (card) => {
        if (!card) return;
        const id = getCardId(card);
        if (state.markedCards.has(id)) {
          state.markedCards.delete(id);
        } else {
          state.markedCards.add(id);
        }
        saveMarked();
        render();
      };

      const toggleDifficultCard = (card) => {
        if (!card) return;
        const id = getCardId(card);
        if (state.difficultCards.has(id)) {
          state.difficultCards.delete(id);
        } else {
          state.difficultCards.add(id);
        }
        saveDifficult();
        render();
      };

      const incrementPracticeCount = (card) => {
        if (!card) return;
        const id = getCardId(card);
        state.practiceCounts[id] = (state.practiceCounts[id] || 0) + 1;
      };

      const getPracticeEligibleCards = () => {
        const cards = cardList();
        const filtered = state.reviewDifficultOnly
          ? cards.filter((card) => state.difficultCards.has(getCardId(card)))
          : cards;
        const underLimit = filtered.filter(
          (card) => (state.practiceCounts[getCardId(card)] || 0) < 2,
        );
        return underLimit.length ? underLimit : filtered;
      };

      const incrementProgress = (type) => {
        if (["flashcards", "quizzes", "matches"].includes(type)) {
          state.progress[type] = (state.progress[type] || 0) + 1;
          saveProgress();
        }
      };

      const trackAnswerResult = (card, isCorrect) => {
        if (!card) return;
        const today = dateKey();
        const id = getCardId(card);
        if (!state.learningStats.daily[today]) {
          state.learningStats.daily[today] = {
            correct: 0,
            wrong: 0,
            seconds: 0,
            learned: 0,
          };
        }
        if (!state.learningStats.cardStats[id]) {
          state.learningStats.cardStats[id] = {
            front: card.front,
            back: card.back,
            lesson: card.lesson,
            correct: 0,
            wrong: 0,
          };
        }
        const stat = state.learningStats.cardStats[id];
        stat.front = card.front;
        stat.back = card.back;
        stat.lesson = card.lesson;
        if (isCorrect) {
          state.learningStats.correctAnswers += 1;
          state.learningStats.daily[today].correct =
            (state.learningStats.daily[today].correct || 0) + 1;
          stat.correct += 1;
        } else {
          state.learningStats.wrongAnswers += 1;
          state.learningStats.daily[today].wrong =
            (state.learningStats.daily[today].wrong || 0) + 1;
          stat.wrong += 1;
        }
        if (
          stat.correct >= 2 &&
          stat.correct >= stat.wrong &&
          !state.learningStats.masteredCards.includes(id)
        ) {
          state.learningStats.masteredCards.push(id);
        }
        saveLearningStats();
      };

      const normalize = (value) =>
        String(value ?? "")
          .normalize("NFC")
          .trim();

      const splitCardBack = (value) => {
        const parts = normalize(value)
          .split(/\r?\n|;/)
          .map((part) => part.trim())
          .filter(Boolean);
        return {
          pinyin: parts[0] || "",
          back: parts[1] || "",
          example: parts.slice(2).join("\n"),
          rawBack: normalize(value),
        };
      };

      const getFilteredCards = (cards) => {
        if (!cards) return [];
        let filtered = [...cards];

        // Filter by status
        if (state.filterStatus === "unviewed") {
          filtered = filtered.filter(
            (card) => !state.viewedCards.has(getCardId(card)),
          );
        } else if (state.filterStatus === "marked") {
          filtered = filtered.filter((card) =>
            state.markedCards.has(getCardId(card)),
          );
        } else if (state.filterStatus === "difficult") {
          filtered = filtered.filter((card) =>
            state.difficultCards.has(getCardId(card)),
          );
        }

        // Filter by practice count
        if (state.filterPracticeCount !== "all") {
          filtered = filtered.filter((card) => {
            const count = state.practiceCounts[getCardId(card)] || 0;
            if (state.filterPracticeCount === "0-2") return count <= 2;
            if (state.filterPracticeCount === "3-5")
              return count >= 3 && count <= 5;
            if (state.filterPracticeCount === "5+") return count > 5;
            return true;
          });
        }

        return filtered;
      };

      const cardList = () => state.lessons[state.lessonIndex]?.cards || [];
      const currentCard = () => cardList()[state.cardIndex] || null;
      const allCards = () => state.lessons.flatMap((lesson) => lesson.cards);

      const escapeHtml = (value) =>
        normalize(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      const field = (label, value, className = "") => {
        if (!normalize(value)) return "";
        return `<div class="field ${className}"><strong>${label}</strong>${escapeHtml(value)}</div>`;
      };

      const shuffleArray = (items) => {
        const copy = [...items];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      };

      const answerText = (card, direction = state.quizDirection) =>
        direction === "zh-vi" ? card.back : card.front;

      const promptText = (card, direction = state.quizDirection) =>
        direction === "zh-vi" ? card.front : card.back;

      const cloneLessons = (lessons) =>
        JSON.parse(JSON.stringify(lessons || []));

      const mergeBundledLessons = (savedLessons, bundledLessons) => {
        const merged = cloneLessons(savedLessons);
        const existingNames = new Set(merged.map((lesson) => lesson.name));
        let added = 0;
        cloneLessons(bundledLessons).forEach((lesson) => {
          if (!existingNames.has(lesson.name)) {
            merged.push(lesson);
            existingNames.add(lesson.name);
            added += 1;
          }
        });
        return { lessons: merged, added };
      };

      const saveLessons = () => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.lessons));
        } catch (error) {
          el.fileError.textContent =
            "Không lưu được dữ liệu trên trình duyệt này.";
        }
      };

      const resetPractice = () => {
        state.cardIndex = Math.min(
          state.cardIndex,
          Math.max(0, cardList().length - 1),
        );
        state.flipped = false;
        state.quiz = null;
        state.match = null;
        state.miniExam = null;
        state.practiceCounts = {};
      };

      const setLessons = (lessons) => {
        state.lessons = lessons
          .map((lesson) => ({
            name: normalize(lesson.name) || "Excel",
            cards: (lesson.cards || [])
              .map((card) => ({
                front: normalize(card.front),
                pinyin: normalize(card.pinyin),
                back: normalize(card.back),
                example: normalize(card.example),
                rawBack: normalize(card.rawBack || card.back),
                lesson: normalize(card.lesson || lesson.name),
              }))
              .filter(
                (card) =>
                  card.front &&
                  (card.back || card.pinyin || card.example || card.rawBack),
              ),
          }))
          .filter((lesson) => lesson.cards.length);
        state.lessonIndex = 0;
        state.cardIndex = 0;
        state.flipped = false;
        state.quiz = null;
        state.match = null;
        state.miniExam = null;
        renderLessonOptions();
        render();
      };

      const renderLessonOptions = () => {
        el.lessonSelect.innerHTML = "";
        state.lessons.forEach((lesson, index) => {
          const option = document.createElement("option");
          option.value = String(index);
          option.textContent = `${lesson.name} (${lesson.cards.length})`;
          el.lessonSelect.append(option);
        });
        el.lessonSelect.value = String(state.lessonIndex);
      };

      const updateFilterInfo = () => {
        const statusText = {
          all: "Tất cả từ",
          unviewed: "Chưa học",
          marked: "Đánh dấu",
          difficult: "Từ khó",
        };
        const countText = {
          all: "tất cả lần",
          "0-2": "0–2 lần",
          "3-5": "3–5 lần",
          "5+": "5+ lần",
        };
        const parts = [];
        if (state.filterStatus !== "all") {
          parts.push(statusText[state.filterStatus]);
        }
        if (state.filterPracticeCount !== "all") {
          parts.push(countText[state.filterPracticeCount]);
        }
        el.filterInfo.textContent =
          parts.length > 0 ? `🔍 ${parts.join(" + ")}` : "Không lọc";
      };

      const renderModeButtons = () => {
        el.showPinyin.setAttribute("aria-pressed", String(state.showPinyin));
        el.hidePinyin.setAttribute("aria-pressed", String(!state.showPinyin));
        el.modeButtons.forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.mode === state.mode),
          );
        });
        el.viewButtons.forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.view === state.view),
          );
        });
        el.quizButtons.forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.quizDirection === state.quizDirection),
          );
        });
        el.reviewAllButton?.setAttribute(
          "aria-pressed",
          String(!state.reviewDifficultOnly),
        );
        el.reviewDifficultButton?.setAttribute(
          "aria-pressed",
          String(state.reviewDifficultOnly),
        );
        el.lightThemeButton?.setAttribute(
          "aria-pressed",
          String(state.theme === "light"),
        );
        el.darkThemeButton?.setAttribute(
          "aria-pressed",
          String(state.theme === "dark"),
        );
        el.filterStatusButtons.forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.filterStatus === state.filterStatus),
          );
        });
        el.filterPracticeCountSelect.value = state.filterPracticeCount;
        updateFilterInfo();
        applyTheme();
      };

      const renderFrame = () => {
        renderModeButtons();
        const lessons = state.lessons;
        const cards = state.reviewDifficultOnly
          ? cardList().filter((card) =>
              state.difficultCards.has(getCardId(card)),
            )
          : cardList();
        const totalCards = state.reviewDifficultOnly
          ? allCards().filter((card) =>
              state.difficultCards.has(getCardId(card)),
            ).length
          : lessons.reduce((sum, lesson) => sum + lesson.cards.length, 0);
        el.cardCount.textContent = String(totalCards);
        el.lessonCount.textContent = String(lessons.length);
        el.flipButton.textContent =
          state.view === "quiz"
            ? "Câu mới"
            : state.view === "match"
              ? "Ván mới"
              : "Lật thẻ";

        if (state.view === "miniExam") {
          el.flipButton.textContent = state.miniExam?.submitted
            ? "Làm lại"
            : "Nộp bài";
        }
        if (state.view === "progress") {
          el.flipButton.textContent = "Làm mới";
        }
        if (state.view === "notebook") {
          el.flipButton.textContent =
            state.notebook.mode === "study" ? "Lật thẻ" : "Làm mới";
        }

        if (!cards.length) {
          el.lessonTitle.textContent = "Không có thẻ";
          el.progressText.textContent = "0 / 0";
          el.cardLesson.textContent = "";
          el.cardIndex.textContent = "";
          el.cardContent.innerHTML =
            '<div class="field">Chưa có dữ liệu Flashcard.</div>';
          return false;
        }

        const lesson = lessons[state.lessonIndex];
        el.lessonTitle.textContent = lesson.name;
        el.cardLesson.textContent = lesson.name;
        return true;
      };

      const renderFlashcard = () => {
        if (!renderFrame()) return;
        const cards = state.reviewDifficultOnly
          ? getPracticeEligibleCards().length
            ? getPracticeEligibleCards()
            : cardList().filter((item) =>
                state.difficultCards.has(getCardId(item)),
              )
          : cardList();
        const card = cards[state.cardIndex] || cards[0] || null;
        el.progressText.textContent = `${state.cardIndex + 1} / ${cards.length}`;
        el.cardIndex.textContent = `${state.cardIndex + 1} / ${cards.length}`;

        let html = "";
        const revealBack = state.flipped || state.mode === "full";
        const showHanzi =
          state.mode === "hanzi" || state.mode === "full" || state.flipped;
        const showPinyin =
          state.showPinyin &&
          (state.mode === "pinyin" || state.mode === "full" || state.flipped);
        const showMeaning =
          state.mode === "meaning" || state.mode === "full" || state.flipped;

        const viewedCount = cards.filter((item) =>
          state.viewedCards.has(getCardId(item)),
        ).length;
        const viewedPercent =
          Math.round((viewedCount / Math.max(cards.length, 1)) * 100) || 0;
        const isMarked = state.markedCards.has(getCardId(card));
        const isDifficult = state.difficultCards.has(getCardId(card));
        const currentPercent =
          Math.round(
            ((state.cardIndex + 1) / Math.max(cards.length, 1)) * 100,
          ) || 0;

        html += `
          <div class="card-progress-header">
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${currentPercent}%"></div>
            </div>
            <div class="progress-label">
              <span>Thẻ: ${state.cardIndex + 1}/${cards.length}</span>
            </div>
          </div>
        `;

        if (showHanzi)
          html += `<div class="hanzi" lang="zh-Hans">${escapeHtml(card.front)}</div>`;
        if (showPinyin) html += field("Pinyin", card.pinyin, "pinyin");
        if (showMeaning || revealBack)
          html += field("Nghĩa", card.back, "meaning");
        if (revealBack) html += field("Ví dụ", card.example, "example");
        if (!html)
          html +=
            '<div class="field">Không có nội dung để hiển thị trong chế độ này.</div>';
        if (state.flipped && card.front) {
          const hanziiUrl = `https://hanzii.net/search/word/${encodeURIComponent(card.front)}?hl=vi`;
          html += `<div class="hanzii-container"><iframe src="${hanziiUrl}" title="Hanzii Dictionary"></iframe></div>`;
        }
        html += `
          <div class="flashcard-progress">
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${viewedPercent}%"></div>
            </div>
            <div class="progress-label">
              <span>Đã xem: ${viewedCount}/${cards.length}</span>
              <div class="nav-buttons">
                <button type="button" class="tool-button" id="markButton" style="padding: 4px 8px; font-size: 12px; ${isMarked ? "background: var(--accent); color: white; border-color: var(--accent);" : ""}">
                  ${isMarked ? "★ Đã đánh dấu" : "☆ Đánh dấu"}
                </button>
                <button type="button" class="tool-button" id="difficultButton" style="padding: 4px 8px; font-size: 12px; ${isDifficult ? "background: #b07a3f; color: white; border-color: #b07a3f;" : ""}">
                  ${isDifficult ? "◆ Từ khó" : "◇ Đánh dấu khó"}
                </button>
                <button type="button" class="tool-button" data-favorite-current style="padding: 4px 8px; font-size: 12px;">
                  ⭐ Yêu thích
                </button>
                <button type="button" class="tool-button" data-add-current-notebook style="padding: 4px 8px; font-size: 12px;">
                  ➕ Thêm vào sổ tay
                </button>
              </div>
            </div>
          </div>
        `;
        el.cardContent.innerHTML = html;
      };

      const createQuiz = () => {
        const cards = getPracticeEligibleCards().filter(
          (card) => promptText(card) && answerText(card),
        );
        if (!cards.length) return null;
        const card = cards[Math.floor(Math.random() * cards.length)];
        incrementPracticeCount(card);
        markCardViewed(card);
        const correct = answerText(card);
        const pool = allCards()
          .map((item) => answerText(item))
          .filter((value) => value && value !== correct);
        const uniqueWrong = [...new Set(pool)];
        const choices = shuffleArray([
          correct,
          ...shuffleArray(uniqueWrong).slice(0, 3),
        ]);
        return { card, correct, choices, selected: "", answered: false };
      };

      const miniExamTypeLabel = (type) => {
        if (type === "zh-vi") return "Chọn nghĩa";
        if (type === "vi-zh") return "Chọn chữ Hán";
        return "Chọn pinyin";
      };

      const miniExamPrompt = (card, type) => {
        if (type === "zh-vi") return card.front;
        if (type === "vi-zh") return card.back;
        return card.front;
      };

      const miniExamAnswer = (card, type) => {
        if (type === "zh-vi") return card.back;
        if (type === "vi-zh") return card.front;
        return card.pinyin;
      };

      const createMiniQuestion = (card, type, sourceCards) => {
        const correct = miniExamAnswer(card, type);
        const wrongPool = sourceCards
          .map((item) => miniExamAnswer(item, type))
          .filter((value) => value && value !== correct);
        const choices = shuffleArray([
          correct,
          ...shuffleArray([...new Set(wrongPool)]).slice(0, 3),
        ]);
        return {
          card,
          type,
          prompt: miniExamPrompt(card, type),
          correct,
          choices,
        };
      };

      const createMiniExam = () => {
        const lessonCards = getPracticeEligibleCards().filter(
          (card) => card.front && card.back,
        );
        const sourceCards = allCards().filter((card) => card.front && card.back);
        const cards = shuffleArray(lessonCards).slice(0, 10);
        const questions = cards
          .map((card, index) => {
            const types = ["zh-vi", "vi-zh"];
            if (card.pinyin) types.push("pinyin");
            const type = types[index % types.length];
            return createMiniQuestion(card, type, sourceCards);
          })
          .filter((question) => question.correct && question.choices.length > 1);
        questions.forEach((question) => {
          incrementPracticeCount(question.card);
          markCardViewed(question.card);
        });
        return {
          questions,
          answers: Array(questions.length).fill(""),
          currentIndex: 0,
          submitted: false,
          tracked: false,
        };
      };

      const miniExamScore = (exam) =>
        exam.questions.reduce(
          (sum, question, index) =>
            sum + (exam.answers[index] === question.correct ? 1 : 0),
          0,
        );

      const submitMiniExam = () => {
        if (!state.miniExam || state.miniExam.submitted) return;
        state.miniExam.submitted = true;
        if (state.miniExam.tracked) return;
        state.miniExam.questions.forEach((question, index) => {
          trackAnswerResult(
            question.card,
            state.miniExam.answers[index] === question.correct,
          );
        });
        state.miniExam.tracked = true;
        saveLearningStats();
      };

      const renderQuiz = () => {
        if (!renderFrame()) return;
        if (!state.quiz) state.quiz = createQuiz();
        const quiz = state.quiz;
        if (!quiz) {
          el.progressText.textContent = "Trắc nghiệm";
          el.cardIndex.textContent = "0 / 0";
          el.cardContent.innerHTML =
            '<div class="practice-panel"><div class="field">Bài này chưa có đủ dữ liệu để tạo trắc nghiệm.</div></div>';
          return;
        }
        const directionLabel =
          state.quizDirection === "zh-vi" ? "Trung → Việt" : "Việt → Trung";
        el.progressText.textContent = `Trắc nghiệm ${directionLabel}`;
        el.cardIndex.textContent = directionLabel;
        const questionClass =
          state.quizDirection === "vi-zh" ? "meaning-prompt" : "";
        const options = quiz.choices
          .map((choice) => {
            const selected = quiz.selected === choice;
            const isCorrect = quiz.correct === choice;
            const className = quiz.answered
              ? isCorrect
                ? " correct"
                : selected
                  ? " wrong"
                  : ""
              : "";
            return `<button class="option-button${className}" data-quiz-choice="${escapeHtml(choice)}" type="button" ${quiz.answered ? "disabled" : ""}>${escapeHtml(choice)}</button>`;
          })
          .join("");
        const feedback = quiz.answered
          ? quiz.selected === quiz.correct
            ? "Đúng rồi. Bấm Tiếp để sang câu khác."
            : `Chưa đúng. Đáp án: ${quiz.correct}`
          : "Chọn một đáp án.";
        const hanziiSection =
          quiz.answered && quiz.card.front
            ? `<div class="hanzii-container"><iframe src="https://hanzii.net/search/word/${encodeURIComponent(quiz.card.front)}?hl=vi" title="Hanzii Dictionary"></iframe></div>`
            : "";
        const quizCardStats =
          state.learningStats.cardStats[getCardId(quiz.card)] || {};
        const quickNotebook =
          quiz.answered &&
          quiz.selected !== quiz.correct &&
          (quizCardStats.wrong || 0) >= 2
            ? '<button class="tool-button" data-add-current-notebook type="button">➕ Thêm từ hay sai vào sổ tay</button>'
            : "";
        const quizProgress =
          Math.round(
            ((state.progress.quizzes + (quiz.answered ? 1 : 0)) /
              Math.max(state.progress.quizzes + 10, 10)) *
              100,
          ) || 0;
        el.cardContent.innerHTML = `
        <div class="practice-panel">
          <div class="progress-section">
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${quizProgress}%"></div>
            </div>
            <div class="progress-label">
              <span>Câu trả lời: ${state.progress.quizzes}${quiz.answered ? "+1" : ""}</span>
            </div>
          </div>
          <p class="quiz-question ${questionClass}" lang="${state.quizDirection === "zh-vi" ? "zh-Hans" : "vi"}">${escapeHtml(promptText(quiz.card))}</p>
          ${state.showPinyin && quiz.card.pinyin ? `<div class="field pinyin"><strong>Pinyin</strong>${escapeHtml(quiz.card.pinyin)}</div>` : ""}
          <div class="option-grid">${options}</div>
          <div class="feedback">${escapeHtml(feedback)}</div>
          ${quickNotebook}
          ${hanziiSection}
        </div>
      `;
      };

      const renderMiniExam = () => {
        if (!renderFrame()) return;
        if (!state.miniExam) state.miniExam = createMiniExam();
        const exam = state.miniExam;
        if (!exam.questions.length) {
          el.progressText.textContent = "Thi thử HSK mini";
          el.cardIndex.textContent = "0 / 0";
          el.cardContent.innerHTML =
            '<div class="practice-panel"><div class="field">Chưa có đủ dữ liệu để tạo đề thi mini.</div></div>';
          return;
        }

        const score = miniExamScore(exam);
        const percent =
          Math.round(
            ((exam.currentIndex + (exam.submitted ? 1 : 0)) /
              Math.max(exam.questions.length, 1)) *
              100,
          ) || 0;
        el.progressText.textContent = exam.submitted
          ? `Kết quả ${score}/${exam.questions.length}`
          : `Thi thử HSK mini ${exam.currentIndex + 1}/${exam.questions.length}`;
        el.cardIndex.textContent = exam.submitted
          ? `${score}/${exam.questions.length}`
          : `${exam.currentIndex + 1} / ${exam.questions.length}`;

        if (exam.submitted) {
          const review = exam.questions
            .map((question, index) => {
              const userAnswer = exam.answers[index] || "Chưa chọn";
              const correct = userAnswer === question.correct;
              return `
                <div class="mini-review-item ${correct ? "correct" : "wrong"}">
                  <p class="mini-review-prompt">${index + 1}. ${escapeHtml(question.prompt)}</p>
                  <p class="mini-review-answer">Bạn chọn: ${escapeHtml(userAnswer)}</p>
                  <p class="mini-review-answer">Đáp án: ${escapeHtml(question.correct)}</p>
                </div>
              `;
            })
            .join("");
          el.cardContent.innerHTML = `
            <div class="practice-panel">
              <div class="mini-exam-header">
                <div class="mini-exam-score">
                  <strong>Điểm: ${score}/${exam.questions.length}</strong>
                  <span>${Math.round((score / exam.questions.length) * 100)}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${Math.round((score / exam.questions.length) * 100)}%"></div>
                </div>
              </div>
              <div class="mini-exam-review">${review}</div>
              <div class="nav-buttons">
                <button class="tool-button primary" data-mini-restart type="button">Làm đề mới</button>
              </div>
            </div>
          `;
          return;
        }

        const question = exam.questions[exam.currentIndex];
        const selected = exam.answers[exam.currentIndex];
        const options = question.choices
          .map(
            (choice) => `
              <button
                class="option-button ${selected === choice ? "selected" : ""}"
                data-mini-choice="${escapeHtml(choice)}"
                type="button"
              >${escapeHtml(choice)}</button>
            `,
          )
          .join("");
        const answeredCount = exam.answers.filter(Boolean).length;
        const questionClass = question.type === "vi-zh" ? "meaning-prompt" : "";
        el.cardContent.innerHTML = `
          <div class="practice-panel">
            <div class="mini-exam-header">
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${percent}%"></div>
              </div>
              <div class="mini-exam-meta">
                <span>Câu ${exam.currentIndex + 1}/${exam.questions.length}</span>
                <span>Đã chọn ${answeredCount}/${exam.questions.length}</span>
              </div>
            </div>
            <span class="mini-exam-type">${miniExamTypeLabel(question.type)}</span>
            <p class="quiz-question ${questionClass}" lang="${question.type === "vi-zh" ? "vi" : "zh-Hans"}">${escapeHtml(question.prompt)}</p>
            <div class="option-grid">${options}</div>
            <div class="feedback">${selected ? "Đã ghi nhận đáp án." : "Chọn một đáp án để tiếp tục."}</div>
            <div class="nav-buttons">
              <button class="tool-button" data-mini-submit type="button">Nộp bài</button>
              <button class="tool-button" data-mini-restart type="button">Làm đề mới</button>
            </div>
          </div>
        `;
      };

      const destroyProgressCharts = () => {
        Object.values(state.chartInstances).forEach((chart) => chart.destroy());
        state.chartInstances = {};
      };

      const getProgressSummary = () => {
        const cards = allCards();
        const ids = cards.map(getCardId);
        const idSet = new Set(ids);
        const learnedIds = ids.filter((id) => state.viewedCards.has(id));
        const masteredIds = state.learningStats.masteredCards.filter((id) =>
          idSet.has(id),
        );
        const wrongReviewIds = Object.entries(state.learningStats.cardStats)
          .filter(([, stat]) => (stat.wrong || 0) > (stat.correct || 0))
          .map(([id]) => id)
          .filter((id) => idSet.has(id));
        const reviewIds = new Set([
          ...ids.filter((id) => state.difficultCards.has(id)),
          ...wrongReviewIds,
        ]);
        const answerTotal =
          state.learningStats.correctAnswers + state.learningStats.wrongAnswers;
        const memoryRate = answerTotal
          ? Math.round((state.learningStats.correctAnswers / answerTotal) * 100)
          : 0;
        return {
          totalCards: cards.length,
          learned: learnedIds.length,
          mastered: masteredIds.length,
          review: reviewIds.size,
          correct: state.learningStats.correctAnswers,
          wrong: state.learningStats.wrongAnswers,
          memoryRate,
        };
      };

      const inferHskLevel = (card) => {
        const scriptLevel = [
          ...document.querySelectorAll("script[src]"),
        ]
          .map((script) => script.getAttribute("src") || "")
          .join(" ");
        const text = `${card.lesson || ""} ${document.title || ""} ${scriptLevel}`;
        const match = text.match(/hsk\s*([1-6])/i);
        return match ? `HSK ${match[1]}` : "HSK";
      };

      const getHskCompletionRows = () => {
        const groups = new Map();
        allCards().forEach((card) => {
          const level = inferHskLevel(card);
          if (!groups.has(level)) groups.set(level, []);
          groups.get(level).push(card);
        });
        return [...groups.entries()]
          .sort(([a], [b]) => a.localeCompare(b, "vi"))
          .map(([level, cards]) => {
            const learned = cards.filter((card) =>
              state.viewedCards.has(getCardId(card)),
            ).length;
            const percent = Math.round(
              (learned / Math.max(cards.length, 1)) * 100,
            );
            return { level, learned, total: cards.length, percent };
          });
      };

      const getTopWrongWords = () =>
        Object.values(state.learningStats.cardStats)
          .filter((stat) => (stat.wrong || 0) > 0)
          .sort(
            (a, b) =>
              (b.wrong || 0) - (a.wrong || 0) ||
              (a.correct || 0) - (b.correct || 0),
          )
          .slice(0, 20);

      const renderProgressCharts = (summary) => {
        destroyProgressCharts();
        if (!window.Chart) return;
        const dailyEntries = Object.entries(state.learningStats.daily).sort(
          ([a], [b]) => a.localeCompare(b),
        );
        const dailyCanvas = document.querySelector("#studyChart");
        const memoryCanvas = document.querySelector("#memoryChart");
        if (dailyCanvas) {
          state.chartInstances.study = new Chart(dailyCanvas, {
            type: "bar",
            data: {
              labels: dailyEntries.map(([date]) => date.slice(5)),
              datasets: [
                {
                  label: "Từ đã học",
                  data: dailyEntries.map(([, day]) => day.learned || 0),
                  backgroundColor: "#6a7fd1",
                },
                {
                  label: "Đúng",
                  data: dailyEntries.map(([, day]) => day.correct || 0),
                  backgroundColor: "#4d8b7c",
                },
                {
                  label: "Sai",
                  data: dailyEntries.map(([, day]) => day.wrong || 0),
                  backgroundColor: "#b07a3f",
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { position: "bottom" } },
              scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
            },
          });
        }
        if (memoryCanvas) {
          state.chartInstances.memory = new Chart(memoryCanvas, {
            type: "doughnut",
            data: {
              labels: ["Đã học", "Đã thuộc", "Cần ôn", "Chưa học"],
              datasets: [
                {
                  data: [
                    summary.learned,
                    summary.mastered,
                    summary.review,
                    Math.max(
                      summary.totalCards - summary.learned,
                      0,
                    ),
                  ],
                  backgroundColor: [
                    "#6a7fd1",
                    "#4d8b7c",
                    "#b07a3f",
                    "#dbe4e8",
                  ],
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { position: "bottom" } },
            },
          });
        }
      };

      const renderProgressDashboard = () => {
        if (!renderFrame()) return;
        saveStudyTime();
        const summary = getProgressSummary();
        const hskRows = getHskCompletionRows()
          .map(
            (row) => `
              <div class="level-row">
                <strong>${escapeHtml(row.level)}</strong>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${row.percent}%"></div>
                </div>
                <span>${row.learned}/${row.total} (${row.percent}%)</span>
              </div>
            `,
          )
          .join("");
        const wrongRows = getTopWrongWords()
          .map(
            (stat) => `
              <div class="wrong-word-item">
                <strong lang="zh-Hans">${escapeHtml(stat.front)}</strong>
                <span>${escapeHtml(stat.back || stat.lesson || "")}</span>
                <em>Sai ${stat.wrong || 0}</em>
              </div>
            `,
          )
          .join("");
        el.lessonTitle.textContent = "📊 Tiến độ học tập";
        el.progressText.textContent = `${summary.learned}/${summary.totalCards} từ đã học`;
        el.cardLesson.textContent = "Dashboard";
        el.cardIndex.textContent = `${summary.memoryRate}% ghi nhớ`;
        el.cardContent.innerHTML = `
          <div class="progress-dashboard">
            <div class="dashboard-grid">
              <div class="dashboard-card"><strong>${summary.learned}</strong><span>Số từ đã học</span></div>
              <div class="dashboard-card"><strong>${summary.mastered}</strong><span>Số từ đã thuộc</span></div>
              <div class="dashboard-card"><strong>${summary.review}</strong><span>Số từ cần ôn tập</span></div>
              <div class="dashboard-card"><strong>${summary.correct}</strong><span>Số câu trả lời đúng</span></div>
              <div class="dashboard-card"><strong>${summary.wrong}</strong><span>Số câu trả lời sai</span></div>
              <div class="dashboard-card"><strong>${formatDuration(state.learningStats.studyTimeSeconds)}</strong><span>Thời gian học tập</span></div>
              <div class="dashboard-card"><strong>${summary.memoryRate}%</strong><span>Tỷ lệ ghi nhớ</span></div>
              <div class="dashboard-card"><strong>${state.learningStats.streak}</strong><span>Chuỗi ngày học liên tiếp</span></div>
              <div class="dashboard-card"><strong>${state.learningStats.totalSessions}</strong><span>Tổng số phiên học</span></div>
            </div>
            <div class="dashboard-section">
              <h2>Hoàn thành theo cấp HSK</h2>
              ${hskRows || '<div class="field">Chưa có dữ liệu cấp HSK.</div>'}
            </div>
            <div class="chart-grid">
              <div class="chart-box"><canvas id="studyChart"></canvas></div>
              <div class="chart-box"><canvas id="memoryChart"></canvas></div>
            </div>
            <div class="dashboard-section">
              <h2>Top 20 từ vựng hay trả lời sai</h2>
              <div class="wrong-word-list">
                ${wrongRows || '<div class="field">Chưa có lịch sử trả lời sai.</div>'}
              </div>
            </div>
          </div>
        `;
        renderProgressCharts(summary);
      };

      const stopNotebookAutoFlip = () => {
        if (state.notebook.autoTimer) {
          window.clearTimeout(state.notebook.autoTimer);
          state.notebook.autoTimer = null;
        }
      };

      const scheduleNotebookAutoFlip = () => {
        stopNotebookAutoFlip();
        if (
          state.view !== "notebook" ||
          state.notebook.mode !== "study" ||
          !state.notebook.autoFlip
        )
          return;
        state.notebook.autoTimer = window.setTimeout(() => {
          state.notebook.studyFlipped = !state.notebook.studyFlipped;
          render();
        }, 3500);
      };

      const notebookFormValue = (name) =>
        normalize(el.cardContent.querySelector(`[data-notebook-field="${name}"]`)?.value);

      const saveNotebookForm = () => {
        const editingId = state.notebook.editingId;
        const existing = state.notebook.items.find((item) => item.id === editingId);
        const item = normalizeNotebookItem({
          id: editingId || undefined,
          hanzi: notebookFormValue("hanzi"),
          pinyin: notebookFormValue("pinyin"),
          meaning: notebookFormValue("meaning"),
